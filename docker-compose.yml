services:
  db:
    image: postgres:17
    restart: unless-stopped

    environment:
      POSTGRES_DB: team_db
      POSTGRES_USER: team_user
      POSTGRES_PASSWORD: team_password

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
    driver: local