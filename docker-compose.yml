services:
  api:
    build: .
    ports:
      - "8000:8000"

    depends_on:
      - db

  db:
    image: postgres:17

    environment:
      POSTGRES_DB: team_db
      POSTGRES_USER: team_user
      POSTGRES_PASSWORD: password

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: