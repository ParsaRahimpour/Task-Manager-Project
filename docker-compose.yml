
services:
  db:
    image: postgres:17
    container_name: task_db
    restart: unless-stopped

    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

    ports:
      - "${DB_PORT}:5432"

    volumes:
      - ./db_data:/var/lib/postgresql/data